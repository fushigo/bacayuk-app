name: bacayuk
version: 1.0.0+1
publish_to: none
description: Project Aplikasi Perpustakaan Digital
environment:
  sdk: ">=3.2.3 <4.0.0"

dependencies:
  another_flutter_splash_screen: ^1.2.0
  lottie: ^3.0.0
  flutter_onboarding_slider: ^1.0.11
  cupertino_icons: ^1.0.2
  get: 4.6.6
  dio: 5.4.0
  pretty_dio_logger: ^1.3.1
  get_storage: ^2.1.1
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter

flutter:
  assets:
    - asset/image/
  fonts:
    - family: Poppins
      fonts:
        - asset: asset/fonts/poppins/Poppins-Regular.ttf
  uses-material-design: true
